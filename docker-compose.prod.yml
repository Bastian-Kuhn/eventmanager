version: "3.3"

services:

  application:
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - 8002:9090
    environment:
      config: prod_compose
      # Stabiler, geheimer Key - identisch ueber alle Worker und Restarts, sonst
      # funktioniert "Angemeldet bleiben" nicht. Auf dem Host setzen (z.B. .env):
      #   SECRET_KEY=$(python3 -c 'import secrets;print(secrets.token_urlsafe(48))')
      SECRET_KEY: ${SECRET_KEY:-}
